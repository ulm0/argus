version: 2

project_name: argus

# Build the Next.js frontend before compiling Go so web/out/ is populated for embed.
before:
  hooks:
    - sh -c "cd web && NEXT_TELEMETRY_DISABLED=1 pnpm install --frozen-lockfile && pnpm run build && rm -rf ../cmd/argus/web/out && mkdir -p ../cmd/argus/web && cp -r out ../cmd/argus/web/out"

builds:
  - id: argus
    main: ./cmd/argus
    binary: argus
    goos:
      - linux
    goarch:
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      # arm6 only makes sense for armv6 (Pi Zero 1)
      - goos: linux
        goarch: arm64
        goarm: "6"
      - goos: linux
        goarch: arm64
        goarm: "7"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X github.com/ulm0/argus/cmd/argus/cmd.Version={{.Version}}
    flags:
      - -trimpath

archives:
  - formats:
      - binary
    # Binaries are published directly (no archive wrapping) — web + templates are embedded.

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: ulm0
    name: argus
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

snapshot:
  version_template: "{{ .Tag }}-next"
